<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couturière</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Couturière</h1>
        <p class="subtitle">style your life</p>
    </header>

    <!-- Filter bar -->
    <div class="filter-bar">
        <button data-category="All" class="filter-btn active">All</button>
        <button data-category="Tops" class="filter-btn">Tops</button>
        <button data-category="Bottoms" class="filter-btn">Bottoms</button>
        <button data-category="Dresses" class="filter-btn">Dresses</button>
    </div>

    <!-- Form to add new item -->
    <div class="add-form">
        <input type="text" id="itemName" required>
        <select id="itemCategory">
            <option value="Tops">Tops</option>
            <option value="Bottoms">Bottoms</option>
            <option value="Dresses">Dresses</option>
        </select>
        <input type="text" id="itemEmoji" maxlength="2" value="👕">
        <button id="addBtn">+ Add to wardrobe</button>
    </div>

    <!-- Grid container for clothing cards -->
    <div id="gridContainer" class="grid-container">
        <!-- JavaScript will fill this -->
    </div>

    <footer>
        <p>2026 · Made by Joaqamole · All rights reserved</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
